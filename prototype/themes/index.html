<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>代办 · 三种视觉风格对比</title>
    <style>
      :root { color-scheme: light; font-family: "Segoe UI Variable", "Microsoft YaHei UI", sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-width: 1120px; color: #15171a; background: #eceef1; }
      header { display: grid; grid-template-columns: 260px 1fr auto; align-items: center; gap: 28px; height: 86px; padding: 0 28px; border-bottom: 1px solid #d2d5da; background: rgba(250,251,252,.94); }
      .brand small, .meta { color: #6a7079; font-size: 11px; letter-spacing: .08em; }
      .brand h1 { margin: 2px 0 0; font-size: 22px; font-weight: 650; }
      nav { display: flex; justify-content: center; gap: 8px; }
      nav button { min-width: 176px; padding: 11px 14px; border: 1px solid transparent; border-radius: 11px; text-align: left; color: #343941; background: transparent; cursor: pointer; transition: .18s ease; }
      nav button strong, nav button span { display: block; }
      nav button strong { font-size: 12px; }
      nav button span { margin-top: 3px; color: #7a8088; font-size: 10px; }
      nav button:hover { background: #f2f4f6; }
      nav button.active { border-color: #c9cdd3; background: white; box-shadow: 0 5px 15px rgba(31,37,44,.08); }
      .meta { text-align: right; }
      main { height: calc(100vh - 86px); padding: 18px; }
      .frame-shell { position: relative; width: 100%; height: 100%; overflow: hidden; border: 1px solid #c8ccd2; border-radius: 16px; background: white; box-shadow: 0 15px 45px rgba(30,37,45,.13); }
      iframe { width: 100%; height: 100%; border: 0; background: white; }
      .hint { position: absolute; right: 14px; bottom: 13px; padding: 7px 10px; border: 1px solid rgba(255,255,255,.4); border-radius: 99px; color: white; background: rgba(18,21,25,.66); font-size: 10px; pointer-events: none; backdrop-filter: blur(10px); }
    </style>
  </head>
  <body>
    <header>
      <div class="brand"><small>STYLE STUDY · 02</small><h1>代办 · 视觉方向对比</h1></div>
      <nav aria-label="视觉风格">
        <button class="active" data-src="native.html"><strong>01 极简原生风</strong><span>安静、清晰、长期使用</span></button>
        <button data-src="glass.html"><strong>02 深色透明风</strong><span>沉浸、轻科技、深色桌面</span></button>
        <button data-src="pixel.html"><strong>03 像素桌宠风</strong><span>鲜明、亲切、轻游戏感</span></button>
      </nav>
      <div class="meta">统一任务内容<br />同时验证收起与展开</div>
    </header>
    <main>
      <div class="frame-shell">
        <iframe id="preview" src="native.html" title="风格预览"></iframe>
        <div class="hint">点击上方切换风格 · 原型内可切换收起/展开</div>
      </div>
    </main>
    <script>
      const buttons = [...document.querySelectorAll("nav button")];
      const preview = document.querySelector("#preview");
      buttons.forEach((button) => button.addEventListener("click", () => {
        buttons.forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
        preview.src = button.dataset.src;
      }));
    </script>
  </body>
</html>
