<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <title>待办</title>
  <desc>深色软件底座里叠放两张任务卡，前方珊瑚橙任务牌带有圆点和标题槽。</desc>
  <defs>
    <linearGradient id="base" x1="92" y1="74" x2="430" y2="454" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3c4048"/>
      <stop offset="1" stop-color="#202226"/>
    </linearGradient>
    <linearGradient id="task" x1="112" y1="214" x2="414" y2="398" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff9b72"/>
      <stop offset="1" stop-color="#e77750"/>
    </linearGradient>
  </defs>

  <rect x="44" y="44" width="424" height="424" rx="132" fill="url(#base)"/>

  <g transform="rotate(6 256 256)">
    <rect x="112" y="116" width="300" height="166" rx="64" fill="#50545d"/>
    <circle cx="181" cy="199" r="31" fill="#717680"/>
    <path d="M244 199H350" fill="none" stroke="#717680" stroke-width="26" stroke-linecap="round"/>
  </g>

  <g transform="translate(0 15) rotate(-6 256 256)" opacity=".42">
    <rect x="82" y="226" width="348" height="182" rx="70" fill="#0c0d0f"/>
  </g>

  <g transform="rotate(-6 256 256)">
    <rect x="82" y="216" width="348" height="182" rx="70" fill="url(#task)"/>
    <circle cx="166" cy="307" r="39" fill="#292b30"/>
    <circle cx="166" cy="307" r="18" fill="#f58c65"/>
    <path d="M248 307H364" fill="none" stroke="#292b30" stroke-width="32" stroke-linecap="round"/>
  </g>
