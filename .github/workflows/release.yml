name: 发布 Windows 安装包

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows:
    name: 构建并发布 Windows x64
    runs-on: windows-latest
    steps:
      - name: 检出源码
        uses: actions/checkout@v7

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: 缓存 Rust 构建
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: 安装前端依赖
        run: npm.cmd ci

      - name: 限制手动发布来源
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          if ('${{ github.ref }}' -ne 'refs/heads/main') { throw '手动发布只能从 main 分支执行' }

      - name: 核对发布版本
        run: npm.cmd run release:version:check

      - name: 读取标准更新日志
        id: changelog
        shell: pwsh
        run: npm.cmd run release:changelog:github-output

      - name: 拒绝覆盖已发布版本
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $package = Get-Content -LiteralPath 'package.json' -Raw | ConvertFrom-Json
          $tag = "v$($package.version)"
          $headers = @{
            Accept = 'application/vnd.github+json'
            Authorization = "Bearer $env:GH_TOKEN"
            'X-GitHub-Api-Version' = '2022-11-28'
          }
          $uri = "https://api.github.com/repos/${{ github.repository }}/releases/tags/$tag"
          $response = Invoke-WebRequest -Uri $uri -Headers $headers -SkipHttpErrorCheck
          if ($response.StatusCode -eq 200) { throw "版本 $tag 已公开发布；请先提升三个版本号，禁止覆盖既有安装器和更新元数据" }
          if ($response.StatusCode -ne 404) { throw "检查已发布版本失败：HTTP $($response.StatusCode)" }

      - name: 运行统一测试门禁
        run: npm.cmd run desktop:check

      - name: 检查 Rust 格式
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: 检查 Rust 静态规则
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: 构建安装包并创建草稿 Release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 待办 v__VERSION__
          releaseBody: ${{ steps.changelog.outputs.releaseBody }}
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          uploadUpdaterSignatures: true
          args: --bundles nsis

      - name: 验证更新签名与 latest.json
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $installers = @(Get-ChildItem -LiteralPath 'src-tauri\target\release\bundle\nsis' -Filter '*-setup.exe')
          if ($installers.Count -ne 1) { throw "期望恰好一个 NSIS 安装器，实际为 $($installers.Count)" }
          $signature = "$($installers[0].FullName).sig"
          if (-not (Test-Path -LiteralPath $signature)) { throw '缺少 NSIS 更新签名' }
          if (-not (Test-Path -LiteralPath 'latest.json')) { throw '缺少 latest.json' }
          cargo run --locked --manifest-path src-tauri/Cargo.toml --example verify_updater_signature -- $installers[0].FullName $signature latest.json
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $metadata = Get-Content -LiteralPath 'latest.json' -Raw | ConvertFrom-Json
          $downloadUrl = $metadata.platforms.'windows-x86_64'.url
          $downloadDirectory = Join-Path $env:RUNNER_TEMP 'updater-metadata-download'
          New-Item -ItemType Directory -Path $downloadDirectory -Force | Out-Null
          $downloadedInstaller = Join-Path $downloadDirectory $installers[0].Name
          $headers = @{
            Accept = 'application/octet-stream'
            Authorization = "Bearer $env:GH_TOKEN"
            'X-GitHub-Api-Version' = '2022-11-28'
          }
          Invoke-WebRequest -Uri $downloadUrl -Headers $headers -OutFile $downloadedInstaller
          if ((Get-FileHash -LiteralPath $downloadedInstaller -Algorithm SHA256).Hash -ne (Get-FileHash -LiteralPath $installers[0].FullName -Algorithm SHA256).Hash) {
            throw 'latest.json 指向的安装器与本次构建产物不一致'
          }

      - name: 核对草稿 Release 更新日志
        id: draft_release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXPECTED_RELEASE_BODY: ${{ steps.changelog.outputs.releaseBody }}
        run: |
          $package = Get-Content -LiteralPath 'package.json' -Raw | ConvertFrom-Json
          $tag = "v$($package.version)"
          $releases = gh api "repos/${{ github.repository }}/releases?per_page=100" | ConvertFrom-Json
          $matches = @($releases | Where-Object { $_.tag_name -eq $tag })
          if ($matches.Count -ne 1) {
            throw "期望找到唯一的 $tag 草稿 Release，实际为 $($matches.Count) 个"
          }
          $release = $matches[0]
          if (-not $release.draft) {
            throw "$tag 在完成全部发布验证前已经不是草稿"
          }
          $expected = ($env:EXPECTED_RELEASE_BODY -replace "`r`n", "`n").Trim()
          $actual = ($release.body -replace "`r`n", "`n").Trim()
          if ($actual -ne $expected) {
            throw '草稿 Release 正文与 CHANGELOG 当前版本段不一致'
          }
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "releaseId=$($release.id)" -Encoding utf8

      - name: 发布已验证的 Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $package = Get-Content -LiteralPath 'package.json' -Raw | ConvertFrom-Json
          $tag = "v$($package.version)"
          $releaseId = '${{ steps.draft_release.outputs.releaseId }}'
          if (-not $releaseId) { throw '缺少已经核对的草稿 Release ID' }
          $published = gh api --method PATCH "repos/${{ github.repository }}/releases/$releaseId" `
            -F draft=false `
            -F prerelease=false `
            -f make_latest=true `
            -f target_commitish="${{ github.sha }}" | ConvertFrom-Json
          if ($published.draft -or $published.tag_name -ne $tag -or $published.target_commitish -ne '${{ github.sha }}') {
            throw "$tag 正式发布后的状态或目标提交不正确"
          }
